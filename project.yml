name: FreeBook
options:
  bundleIdPrefix: com.raikiri1498
  deploymentTarget:
    iOS: "17.0"
  projectFormat: Xcode_15.0
packages:
  SwiftSoup:
    type: git
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0
  ZIPFoundation:
    type: git
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.0
  onnxruntime-swift-package-manager:
    type: git
    url: https://github.com/microsoft/onnxruntime-swift-package-manager.git
    from: 1.16.0
  espeak-ng-spm:
    type: git
    url: https://github.com/espeak-ng/espeak-ng-spm.git
    revision: cb0dfa23248513e39b9619d8d1383da329507281
targets:
  FreeBook:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: SwiftSoup
      - package: ZIPFoundation
      - package: onnxruntime-swift-package-manager
        product: onnxruntime
      - package: espeak-ng-spm
        product: libespeak-ng
      - package: espeak-ng-spm
        product: espeak-ng-data
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Tàng Công Các"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.raikiri1498.FreeBook
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  FreeBookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: FreeBook
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.raikiri1498.FreeBookTests
