name: FreeBook
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    iOS: "17.0"
packages:
  SwiftSoup:
    type: git
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0
  ZIPFoundation:
    type: git
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.0
targets:
  FreeBook:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: SwiftSoup
      - package: ZIPFoundation
    info:
      path: Sources/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.FreeBook
  FreeBookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: FreeBook
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.FreeBookTests
