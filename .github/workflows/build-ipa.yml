name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Cache Homebrew
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: macos-homebrew-xcodegen-${{ hashFiles('project.yml') }}
        restore-keys: |
          macos-homebrew-xcodegen-

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode Project
      run: |
        xcodegen generate

    - name: Build and Archive App (Unsigned)
      run: |
        xcodebuild archive \
          -scheme FreeBook \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/FreeBook.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          DEVELOPMENT_TEAM=""

    - name: Package IPA
      run: |
        mkdir -p build/Payload
        cp -r build/FreeBook.xcarchive/Products/Applications/FreeBook.app build/Payload/
        cd build
        zip -r FreeBook.ipa Payload
        echo "IPA packaged at build/FreeBook.ipa"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeBook-Unsigned-IPA
        path: build/FreeBook.ipa
        if-no-files-found: error
