name: Build Unsigned IPA

on:
  push:
    branches: [ main, vertical_reader ]
    paths:
      - 'Sources/**'
  pull_request:
    branches: [ main, vertical_reader ]
    paths:
      - 'Sources/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Cache Homebrew
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: ${{ runner.os }}-homebrew-xcodegen-${{ hashFiles('project.yml') }}
        restore-keys: |
          ${{ runner.os }}-homebrew-xcodegen-

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode Project
      run: |
        xcodegen generate 2>&1 | tee build_error.log

    - name: Resolve and patch Package dependencies
      run: |
        set -euo pipefail
        xcodebuild -resolvePackageDependencies -project FreeBook.xcodeproj -scheme FreeBook -derivedDataPath build_dd 2>&1 | tee -a build_error.log
        python3 -c '
        import os
        p = "build_dd/SourcePackages/checkouts/espeak-ng-spm/Package.swift"
        if os.path.exists(p):
            os.chmod(p, 0o644)
            with open(p, "r") as f:
                c = f.read()
            target = ".define(\"N_PATH_HOME\", to: \"1024\"),"
            replacement = target + "\n        .unsafeFlags([\"-Wno-error=implicit-function-declaration\", \"-Wno-error=implicit-int\", \"-Wno-error=incompatible-pointer-types\"]),"
            if target in c:
                c = c.replace(target, replacement)
                with open(p, "w") as f:
                    f.write(c)
                print("Patched Package.swift successfully!")
            else:
                print("Error: Target string not found in Package.swift!")
                exit(1)
        else:
            print(f"Error: {p} not found!")
            exit(1)
        '

    - name: Build and Archive App (Unsigned)
      run: |
        set -euo pipefail
        xcodebuild archive \
          -scheme FreeBook \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/FreeBook.xcarchive \
          -derivedDataPath build_dd \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          DEVELOPMENT_TEAM=""

    - name: Package IPA
      run: |
        set -euo pipefail
        mkdir -p build/Payload
        cp -r build/FreeBook.xcarchive/Products/Applications/FreeBook.app build/Payload/
        
        # 1. Cài đặt espeak-ng trên máy chủ macOS của Github để lấy dữ liệu âm vị đã biên dịch nhị phân
        HOMEBREW_NO_AUTO_UPDATE=1 brew install espeak-ng
        BREW_DATA_PATH="$(brew --prefix espeak-ng)/share/espeak-ng-data"
        DEST_DATA_PATH="build/Payload/FreeBook.app/espeak-ng_data.bundle/espeak-ng-data"
        
        if [ -d "$DEST_DATA_PATH" ]; then
          echo "Copying compiled espeak-ng database files recursively to $DEST_DATA_PATH"
          cp -R "$BREW_DATA_PATH"/* "$DEST_DATA_PATH"/
          
          # 2. Xóa các từ điển ngôn ngữ không sử dụng để giảm dung lượng file IPA
          echo "Cleaning up unnecessary dictionaries..."
          for f in "$DEST_DATA_PATH"/*_dict; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            if [ "$filename" != "vi_dict" ] && [ "$filename" != "en_dict" ]; then
              rm -f "$f"
            fi
          done
          
          # 3. Dọn dẹp các tệp cấu hình giọng nói dư thừa
          VOICES_DIR="$DEST_DATA_PATH/voices"
          if [ -d "$VOICES_DIR" ]; then
            echo "Cleaning up unnecessary voices..."
            for d in "$VOICES_DIR"/*; do
              [ -e "$d" ] || continue
              name=$(basename "$d")
              if [ -d "$d" ]; then
                if [ "$name" != "!v" ] && [ "$name" != "en" ] && [ "$name" != "asia" ]; then
                  rm -rf "$d"
                fi
              else
                case "$name" in
                  active|default|en*|vi*) ;;
                  *) rm -f "$d" ;;
                esac
              fi
            done
            
            # Chỉ giữ giọng đọc tiếng Việt trong voices/asia
            if [ -d "$VOICES_DIR/asia" ]; then
              for f in "$VOICES_DIR/asia"/*; do
                [ -e "$f" ] || continue
                name=$(basename "$f")
                case "$name" in
                  vi*) ;;
                  *) rm -rf "$f" ;;
                esac
              done
            fi
          fi
          
          # 4. Xác minh sự tồn tại của các file cơ sở dữ liệu quan trọng
          echo "Verifying core espeak-ng database files..."
          test -f "$DEST_DATA_PATH/phondata"
          test -f "$DEST_DATA_PATH/phontab"
          test -f "$DEST_DATA_PATH/phonindex"
          test -f "$DEST_DATA_PATH/intonations"
          echo "Core verification successful!"
        else
          echo "Error: $DEST_DATA_PATH does not exist!"
          exit 1
        fi
        
        cd build
        zip -r FreeBook.ipa Payload
        echo "IPA packaged successfully at build/FreeBook.ipa"

    - name: Send IPA to Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TO_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO_CHAT_ID }}
      run: |
        IPA_PATH="build/FreeBook.ipa"
        if [ ! -f "$IPA_PATH" ]; then
          echo "Error: IPA file not found at $IPA_PATH"
          exit 1
        fi
        
        FILE_SIZE=$(wc -c < "$IPA_PATH")
        MAX_SIZE=50000000 # ~47.6 MB để đảm bảo an toàn cho giới hạn 50MB của Telegram Bot
        
        # Lấy toàn bộ nội dung commit message gần nhất
        COMMIT_MSG=$(git log -1 --pretty=format:"%B")
        
        echo "IPA File Size: $FILE_SIZE bytes"
        
        if [ "$FILE_SIZE" -lt "$MAX_SIZE" ]; then
          echo "File size is under 50MB. Uploading directly to Telegram..."
          
          # Dùng printf để định dạng chuỗi xuống dòng an toàn cho YAML
          CAPTION=$(printf "📦 FreeBook Build Thành Công! 🚀\n\n💬 Commit Message:\n%s" "$COMMIT_MSG")

          curl -F chat_id="${TELEGRAM_CHAT_ID}" \
               -F document=@"$IPA_PATH" \
               -F caption="$CAPTION" \
               https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument
        else
          echo "File size is over 50MB ($FILE_SIZE bytes). Uploading to transfer.sh..."
          # Tải lên transfer.sh làm link dự phòng
          UPLOAD_URL=$(curl --upload-file "$IPA_PATH" "https://transfer.sh/FreeBook.ipa")
          echo "Uploaded to: $UPLOAD_URL"
          
          # Định dạng nội dung tin nhắn bằng printf
          TEXT=$(printf "📦 FreeBook Build Thành Công! (File vượt quá 50MB)\n\n💬 Commit Message:\n%s\n\nTải IPA tại đây: %s" "$COMMIT_MSG" "$UPLOAD_URL")
          
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
               --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
               --data-urlencode "text=$TEXT"
        fi

    - name: Send Failure Notification to Telegram
      if: failure()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TO_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO_CHAT_ID }}
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%B")
        
        # Định dạng tin nhắn lỗi bằng printf (bỏ chi tiết lỗi cụ thể)
        TEXT=$(printf "❌ FreeBook Build Thất Bại! 🛑\n\n💬 Commit Message:\n%s\n\n🔗 Xem toàn bộ log tại: https://github.com/%s/actions/runs/%s" "$COMMIT_MSG" "${{ github.repository }}" "${{ github.run_id }}")
        
        curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
             --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
             --data-urlencode "text=$TEXT"
