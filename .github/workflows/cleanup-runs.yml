name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động vào lúc 00:00 UTC hằng ngày (07:00 giờ Việt Nam)
  workflow_dispatch: # Cho phép kích hoạt chạy thủ công từ trang GitHub Actions

jobs:
  cleanup:
    name: Delete Runs Older Than 3 Days
    runs-on: ubuntu-latest
    permissions:
      actions: write # Cấp quyền ghi để có thể thực hiện lệnh xóa các run
    steps:
      - name: Delete Old Runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const days_to_keep = 3;
            const ms_keep = days_to_keep * 24 * 60 * 60 * 1000;
            const threshold = new Date(Date.now() - ms_keep);
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const response = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 100
            });
            
            const runs = response.data.workflow_runs;
            console.log(`Found ${runs.length} runs in total.`);
            
            runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            const runsToDelete = runs.slice(1).filter(run => {
              const runDate = new Date(run.created_at);
              return runDate < threshold;
            });
            
            console.log(`Deleting ${runsToDelete.length} runs older than ${days_to_keep} days.`);
            
            for (const run of runsToDelete) {
              try {
                console.log(`Deleting run ID ${run.id} (created at ${run.created_at})`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              } catch (err) {
                console.error(`Failed to delete run ID ${run.id}: ${err.message}`);
              }
            }
